<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BATTLE ROYALE PRO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body { overflow: hidden; background: #000; font-family: 'Arial', sans-serif; touch-action: none; }
        
        #gameCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }
        
        #ui {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }
        
        .hud-top {
            position: absolute;
            top: 15px;
            left: 15px;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
        }
        
        .hud-top h1 {
            font-size: 22px;
            color: #ff6b35;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .hud-stats {
            position: absolute;
            top: 15px;
            right: 15px;
            text-align: right;
            color: #fff;
        }
        
        .stat-box {
            background: rgba(0,0,0,0.75);
            padding: 10px 15px;
            margin-bottom: 8px;
            border-radius: 8px;
            border-left: 3px solid #ff6b35;
            font-size: 12px;
        }
        
        .stat-box div:last-child {
            font-size: 20px;
            color: #ff6b35;
            font-weight: bold;
        }
        
        .health-bar-container {
            position: absolute;
            bottom: 30px;
            left: 20px;
            width: 250px;
        }
        
        .health-bar {
            width: 100%;
            height: 25px;
            background: rgba(0,0,0,0.7);
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #fff;
            box-shadow: 0 0 15px rgba(255,107,53,0.5);
        }
        
        .health-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff3333, #ff6b35, #ffaa00);
            transition: width 0.2s;
        }
        
        .armor-bar {
            width: 100%;
            height: 6px;
            background: rgba(0,0,0,0.7);
            border-radius: 3px;
            margin-top: 4px;
            overflow: hidden;
            border: 1px solid #4da6ff;
        }
        
        .armor-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #0066cc, #4da6ff);
        }
        
        .ammo-display {
            position: absolute;
            bottom: 30px;
            right: 180px;
            color: #fff;
            font-size: 36px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255,107,53,0.8);
        }
        
        .ammo-display span { font-size: 18px; color: #aaa; }
        
        .minimap {
            position: absolute;
            bottom: 30px;
            right: 20px;
            width: 120px;
            height: 120px;
            background: rgba(0,30,0,0.9);
            border-radius: 50%;
            border: 3px solid #ff6b35;
            overflow: hidden;
        }
        
        .minimap-canvas {
            width: 100%;
            height: 100%;
        }
        
        .crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            pointer-events: none;
        }
        
        .crosshair::before, .crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255,255,255,0.9);
        }
        
        .crosshair::before {
            width: 2px;
            height: 20px;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }
        
        .crosshair::after {
            width: 20px;
            height: 2px;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }
        
        .crosshair-circle {
            position: absolute;
            width: 35px;
            height: 35px;
            border: 2px solid rgba(255,107,53,0.8);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        .weapon-slot {
            position: absolute;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
        }
        
        .weapon-box {
            width: 60px;
            height: 40px;
            background: rgba(0,0,0,0.7);
            border: 2px solid #555;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 10px;
            font-weight: bold;
        }
        
        .weapon-box.active {
            border-color: #ff6b35;
            background: rgba(255,107,53,0.3);
        }
        
        .hit-marker {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30px;
            height: 30px;
            border: 3px solid #ff6b35;
            opacity: 0;
            pointer-events: none;
        }
        
        .hit-marker.show {
            animation: hitAnim 0.15s ease;
        }
        
        @keyframes hitAnim {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
            50% { transform: translate(-50%, -50%) scale(1.3); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
        }
        
        .kill-feed {
            position: absolute;
            top: 80px;
            right: 15px;
            text-align: right;
        }
        
        .kill-item {
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 6px 12px;
            margin-bottom: 4px;
            border-radius: 5px;
            font-size: 11px;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        #startScreen, #gameOverScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 50%, #0d1b2a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            pointer-events: auto;
        }
        
        #startScreen h1, #gameOverScreen h1 {
            font-size: 48px;
            color: #ff6b35;
            text-transform: uppercase;
            letter-spacing: 8px;
            margin-bottom: 15px;
            text-shadow: 0 0 30px rgba(255,107,53,0.6);
        }
        
        #startScreen p, #gameOverScreen p {
            color: #aaa;
            font-size: 16px;
            margin-bottom: 30px;
        }
        
        .btn {
            padding: 15px 45px;
            font-size: 18px;
            background: linear-gradient(90deg, #ff6b35, #ff8c42);
            border: none;
            color: #fff;
            border-radius: 30px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
            box-shadow: 0 8px 25px rgba(255,107,53,0.4);
            margin: 10px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(255,107,53,0.6);
        }
        
        .controls-info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255,255,255,0.6);
            font-size: 11px;
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-radius: 10px;
        }
        
        .controls-info h3 {
            color: #ff6b35;
            margin-bottom: 8px;
            font-size: 13px;
        }
        
        .controls-info p { margin: 3px 0; }
        
        .reload-indicator {
            position: absolute;
            bottom: 80px;
            right: 180px;
            color: #ff6b35;
            font-size: 14px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .reload-indicator.show { opacity: 1; }

        /* Mobile Controls */
        .mobile-controls {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 200;
        }
        
        .joystick-area {
            position: absolute;
            bottom: 100px;
            left: 50px;
            width: 120px;
            height: 120px;
            pointer-events: auto;
        }
        
        .joystick-base {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
        }
        
        .joystick-knob {
            position: absolute;
            width: 50px;
            height: 50px;
            background: rgba(255,107,53,0.6);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        .fire-btn {
            position: absolute;
            bottom: 100px;
            right: 50px;
            width: 80px;
            height: 80px;
            background: rgba(255,107,53,0.4);
            border: 3px solid #ff6b35;
            border-radius: 50%;
            pointer-events: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: bold;
            font-size: 14px;
        }
        
        @media (max-width: 768px) {
            .mobile-controls { display: block; }
            .controls-info { display: none; }
            .health-bar-container { width: 180px; }
            .ammo-display { right: 150px; font-size: 28px; }
            .minimap { width: 80px; height: 80px; }
        }
    </style>
</head>
<body>
    <div id="startScreen">
        <h1>BATTLE ROYALE</h1>
        <p>3D Open World Shooter</p>
        <button class="btn" id="startBtn">PLAY NOW</button>
        <div class="controls-info" style="position: static; margin-top: 30px;">
            <h3>HOW TO PLAY</h3>
            <p>WASD - Move | Mouse - Look</p>
            <p>Click - Shoot | R - Reload</p>
            <p>1/2 - Switch Weapons</p>
        </div>
    </div>
    
    <div id="gameOverScreen" style="display: none;">
        <h1 id="gameOverTitle">GAME OVER</h1>
        <p id="gameOverStats">Kills: 0</p>
        <button class="btn" id="restartBtn">PLAY AGAIN</button>
    </div>
    
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui" style="display: none;">
        <div class="hud-top">
            <h1>BATTLE ROYALE</h1>
        </div>
        
        <div class="hud-stats">
            <div class="stat-box">
                <div>ALIVE</div>
                <div id="aliveCount">25</div>
            </div>
            <div class="stat-box">
                <div>KILLS</div>
                <div id="killCount">0</div>
            </div>
        </div>
        
        <div class="kill-feed" id="killFeed"></div>
        
        <div class="health-bar-container">
            <div class="health-bar">
                <div class="health-fill" id="healthFill"></div>
            </div>
            <div class="armor-bar">
                <div class="armor-fill" id="armorFill"></div>
            </div>
        </div>
        
        <div class="ammo-display">
            <span id="currentAmmo">30</span><span>/</span><span id="totalAmmo">90</span>
        </div>
        
        <div class="reload-indicator" id="reloadIndicator">RELOADING...</div>
        
        <div class="weapon-slot">
            <div class="weapon-box active" id="weapon1">AK-47</div>
            <div class="weapon-box" id="weapon2">PISTOL</div>
        </div>
        
        <div class="minimap">
            <canvas class="minimap-canvas" id="minimapCanvas" width="120" height="120"></canvas>
        </div>
        
        <div class="crosshair">
            <div class="crosshair-circle"></div>
        </div>
        
        <div class="hit-marker" id="hitMarker"></div>
        
        <div class="controls-info">
            <h3>CONTROLS</h3>
            <p><strong>WASD</strong> - Move</p>
            <p><strong>MOUSE</strong> - Look</p>
            <p><strong>CLICK</strong> - Shoot</p>
            <p><strong>R</strong> - Reload</p>
            <p><strong>1/2</strong> - Weapons</p>
        </div>
    </div>
    
    <div class="mobile-controls" id="mobileControls">
        <div class="joystick-area" id="joystickArea">
            <div class="joystick-base"></div>
            <div class="joystick-knob" id="joystickKnob"></div>
        </div>
        <div class="fire-btn" id="fireBtn">FIRE</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Game State
        const gameState = {
            isPlaying: false,
            health: 100,
            armor: 100,
            kills: 0,
            alive: 25,
            ammo: 30,
            totalAmmo: 90,
            currentWeapon: 1,
            isReloading: false,
            enemies: [],
            particles: [],
            trees: [],
            buildings: [],
            lastShot: 0
        };
        
        // Three.js Setup
        const canvas = document.getElementById('gameCanvas');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 30, 250);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 500);
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        
        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        
        const sunLight = new THREE.DirectionalLight(0xffffff, 0.9);
        sunLight.position.set(100, 150, 80);
        sunLight.castShadow = true;
        sunLight.shadow.camera.left = -150;
        sunLight.shadow.camera.right = 150;
        sunLight.shadow.camera.top = 150;
        sunLight.shadow.camera.bottom = -150;
        sunLight.shadow.mapSize.width = 2048;
        sunLight.shadow.mapSize.height = 2048;
        scene.add(sunLight);
        
        // Ground with terrain
        const groundGeo = new THREE.PlaneGeometry(600, 600, 80, 80);
        const posAttribute = groundGeo.attributes.position;
        const colors = [];
        
        for (let i = 0; i < posAttribute.count; i++) {
            const x = posAttribute.getX(i);
            const y = posAttribute.getY(i);
            const height = Math.sin(x * 0.02) * Math.cos(y * 0.02) * 4 + 
                          Math.sin(x * 0.05) * 1.5 +
                          Math.random() * 0.5;
            posAttribute.setZ(i, height);
            
            const color = new THREE.Color();
            if (height > 3) color.setHex(0x6b9b6b);
            else if (height > 1) color.setHex(0x5a8a5a);
            else color.setHex(0x4a7a4a);
            colors.push(color.r, color.g, color.b);
        }
        
        groundGeo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
        groundGeo.computeVertexNormals();
        
        const groundMat = new THREE.MeshLambertMaterial({ vertexColors: true });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);
        
        // Detailed Trees
        function createTree(x, z, scale = 1) {
            const group = new THREE.Group();
            
            // Trunk
            const trunkGeo = new THREE.CylinderGeometry(0.25 * scale, 0.4 * scale, 3 * scale, 6);
            const trunkMat = new THREE.MeshLambertMaterial({ color: 0x4a3728 });
            const trunk = new THREE.Mesh(trunkGeo, trunkMat);
            trunk.position.y = 1.5 * scale;
            trunk.castShadow = true;
            group.add(trunk);
            
            // Leaves - multiple layers
            const leafColors = [0x2d6b2d, 0x3d7b3d, 0x1d5b1d];
            for (let i = 0; i < 3; i++) {
                const size = (2.2 - i * 0.4) * scale;
                const height = (2.5 - i * 0.4) * scale;
                const leavesGeo = new THREE.ConeGeometry(size, height, 7);
                const leavesMat = new THREE.MeshLambertMaterial({ color: leafColors[i] });
                const leaves = new THREE.Mesh(leavesGeo, leavesMat);
                leaves.position.y = (4 + i * 1.5) * scale;
                leaves.castShadow = true;
                group.add(leaves);
            }
            
            group.position.set(x, 0, z);
            return group;
        }
        
        // Add trees
        for (let i = 0; i < 120; i++) {
            const x = (Math.random() - 0.5) * 500;
            const z = (Math.random() - 0.5) * 500;
            if (Math.abs(x) < 20 && Math.abs(z) < 20) continue;
            const scale = 0.7 + Math.random() * 0.6;
            const tree = createTree(x, z, scale);
            scene.add(tree);
            gameState.trees.push(tree);
        }
        
        // Rocks
        function createRock(x, z, scale) {
            const geo = new THREE.DodecahedronGeometry(scale, 0);
            const mat = new THREE.MeshLambertMaterial({ color: 0x666666 });
            const rock = new THREE.Mesh(geo, mat);
            rock.position.set(x, scale * 0.4, z);
            rock.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
            rock.castShadow = true;
            rock.receiveShadow = true;
            return rock;
        }
        
        for (let i = 0; i < 30; i++) {
            const x = (Math.random() - 0.5) * 500;
            const z = (Math.random() - 0.5) * 500;
            const scale = 0.8 + Math.random() * 2;
            scene.add(createRock(x, z, scale));
        }
        
        // Buildings
        function createBuilding(x, z, w, h, d) {
            const group = new THREE.Group();
            
            // Main building
            const buildingGeo = new THREE.BoxGeometry(w, h, d);
            const buildingMat = new THREE.MeshLambertMaterial({ color: 0x8B7355 });
            const building = new THREE.Mesh(buildingGeo, buildingMat);
            building.position.y = h / 2;
            building.castShadow = true;
            building.receiveShadow = true;
            group.add(building);
            
            // Roof
            const roofGeo = new THREE.ConeGeometry(Math.max(w, d) * 0.7, 3, 4);
            const roofMat = new THREE.MeshLambertMaterial({ color: 0x3d2817 });
            const roof = new THREE.Mesh(roofGeo, roofMat);
            roof.position.y = h + 1.5;
            roof.rotation.y = Math.PI / 4;
            roof.castShadow = true;
            group.add(roof);
            
            // Door
            const doorGeo = new THREE.BoxGeometry(1.5, 2.5, 0.3);
            const doorMat = new THREE.MeshLambertMaterial({ color: 0x2d1f0f });
            const door = new THREE.Mesh(doorGeo, doorMat);
            door.position.set(0, 1.25, d / 2 + 0.15);
            group.add(door);
            
            // Windows
            const windowGeo = new THREE.BoxGeometry(1.2, 1.2, 0.2);
            const windowMat = new THREE.MeshLambertMaterial({ color: 0x87CEEB });
            
            const w1 = new THREE.Mesh(windowGeo, windowMat);
            w1.position.set(-w / 3, h / 2, d / 2 + 0.1);
            group.add(w1);
            
            const w2 = new THREE.Mesh(windowGeo, windowMat);
            w2.position.set(w / 3, h / 2, d / 2 + 0.1);
            group.add(w2);
            
            group.position.set(x, 0, z);
            return group;
        }
        
        // Add buildings
        const buildings = [
            [0, -40, 18, 14, 18],
            [50, 20, 22, 16, 22],
            [-60, 30, 16, 12, 16],
            [40, -60, 25, 18, 20],
            [-50, -50, 20, 14, 18]
        ];
        
        buildings.forEach(b => {
            const building = createBuilding(b[0], b[1], b[2], b[3], b[4]);
            scene.add(building);
            gameState.buildings.push(building);
        });
        
        // Enemy creation with better model
        function createEnemy(x, z) {
            const group = new THREE.Group();
            
            // Body
            const bodyGeo = new THREE.CapsuleGeometry(0.5, 2, 4, 8);
            const bodyMat = new THREE.MeshLambertMaterial({ color: 0xaa3333 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 1.5;
            body.castShadow = true;
            group.add(body);
            
            // Head
            const headGeo = new THREE.SphereGeometry(0.4, 8, 8);
            const headMat = new THREE.MeshLambertMaterial({ color: 0xcc5555 });
            const head = new THREE.Mesh(headGeo, headMat);
            head.position.y = 3;
            head.castShadow = true;
            group.add(head);
            
            // Gun
            const gunGeo = new THREE.BoxGeometry(0.12, 0.12, 1);
            const gunMat = new THREE.MeshLambertMaterial({ color: 0x222222 });
            const gun = new THREE.Mesh(gunGeo, gunMat);
            gun.position.set(0.4, 1.8, 0.5);
            group.add(gun);
            
            group.position.set(x, 0, z);
            group.userData = { 
                health: 100, 
                speed: 2 + Math.random() * 1.5,
                lastShot: 0,
                state: 'idle'
            };
            return group;
        }
        
        // Spawn enemies
        for (let i = 0; i < 24; i++) {
            let x, z;
            do {
                x = (Math.random() - 0.5) * 300;
                z = (Math.random() - 0.5) * 300;
            } while (Math.abs(x) < 30 && Math.abs(z) < 30);
            
            const enemy = createEnemy(x, z);
            scene.add(enemy);
            gameState.enemies.push(enemy);
        }
        
        // Player
        const player = new THREE.Group();
        const playerBody = new THREE.Mesh(
            new THREE.CapsuleGeometry(0.6, 2.5, 4, 8),
            new THREE.MeshLambertMaterial({ color: 0x4169E1 })
        );
        playerBody.position.y = 2;
        playerBody.castShadow = true;
        player.add(playerBody);
        player.position.set(0, 0, 0);
        scene.add(player);
        
        // Weapon models
        function createAK47() {
            const group = new THREE.Group();
            
            // Body
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(0.2, 0.3, 2),
                new THREE.MeshLambertMaterial({ color: 0x4a3728 })
            );
            group.add(body);
            
            // Magazine
            const mag = new THREE.Mesh(
                new THREE.BoxGeometry(0.18, 0.7, 0.4),
                new THREE.MeshLambertMaterial({ color: 0x333333 })
            );
            mag.position.set(0, -0.4, 0.3);
            mag.rotation.x = 0.2;
            group.add(mag);
            
            // Barrel
            const barrel = new THREE.Mesh(
                new THREE.CylinderGeometry(0.05, 0.05, 0.8),
                new THREE.MeshLambertMaterial({ color: 0x111111 })
            );
            barrel.rotation.x = Math.PI / 2;
            barrel.position.z = 1.4;
            group.add(barrel);
            
            return group;
        }
        
        function createPistol() {
            const group = new THREE.Group();
            
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(0.15, 0.25, 0.8),
                new THREE.MeshLambertMaterial({ color: 0x2d2d2d })
            );
            group.add(body);
            
            const handle = new THREE.Mesh(
                new THREE.BoxGeometry(0.12, 0.45, 0.2),
                new THREE.MeshLambertMaterial({ color: 0x4a3728 })
            );
            handle.position.set(0, -0.3, 0.1);
            handle.rotation.x = 0.15;
            group.add(handle);
            
            return group;
        }
        
        const weapons = { 1: createAK47(), 2: createPistol() };
        let currentWeaponMesh = weapons[1];
        currentWeaponMesh.position.set(0.35, -0.35, -0.8);
        camera.add(currentWeaponMesh);
        scene.add(camera);
        
        // Particles
        function createParticles(pos, color, count = 6) {
            for (let i = 0; i < count; i++) {
                const geo = new THREE.BoxGeometry(0.06, 0.06, 0.06);
                const mat = new THREE.MeshBasicMaterial({ color: color });
                const p = new THREE.Mesh(geo, mat);
                p.position.copy(pos);
                p.position.x += (Math.random() - 0.5);
                p.position.y += (Math.random() - 0.5);
                p.position.z += (Math.random() - 0.5);
                p.userData = {
                    vel: new THREE.Vector3(
                        (Math.random() - 0.5) * 6,
                        Math.random() * 6,
                        (Math.random() - 0.5) * 6
                    ),
                    life: 0.8
                };
                scene.add(p);
                gameState.particles.push(p);
            }
        }
        
        // Controls
        const keys = {};
        let mouseX = 0, mouseY = 0;
        let isLocked = false;
        
        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'KeyR') reload();
            if (e.code === 'Digit1') switchWeapon(1);
            if (e.code === 'Digit2') switchWeapon(2);
        });
        
        document.addEventListener('keyup', (e) => keys[e.code] = false);
        
        document.addEventListener('mousemove', (e) => {
            if (isLocked && gameState.isPlaying) {
                mouseX -= e.movementX * 0.0025;
                mouseY -= e.movementY * 0.0025;
                mouseY = Math.max(-1, Math.min(1, mouseY));
            }
        });
        
        canvas.addEventListener('mousedown', (e) => {
            if (gameState.isPlaying && !gameState.isReloading && e.button === 0) {
                shoot();
            }
        });
        
        document.addEventListener('pointerlockchange', () => {
            isLocked = document.pointerLockElement === canvas;
        });
        
        // Shooting
        function shoot() {
            const now = Date.now();
            if (now - gameState.lastShot < 100) return;
            gameState.lastShot = now;
            
            if (gameState.ammo <= 0) {
                reload();
                return;
            }
            
            gameState.ammo--;
            updateUI();
            
            // Recoil
            currentWeaponMesh.position.z += 0.1;
            setTimeout(() => currentWeaponMesh.position.z -= 0.1, 60);
            
            // Muzzle flash
            const flash = new THREE.PointLight(0xffaa00, 3, 6);
            flash.position.set(0, 0, -1.5);
            camera.add(flash);
            setTimeout(() => camera.remove(flash), 40);
            
            // Raycast
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            
            // Check enemy hits
            for (let i = gameState.enemies.length - 1; i >= 0; i--) {
                const enemy = gameState.enemies[i];
                const intersects = raycaster.intersectObject(enemy, true);
                if (intersects.length > 0 && intersects[0].distance < 60) {
                    enemy.userData.health -= 34;
                    createParticles(intersects[0].point, 0xff0000, 4);
                    
                    document.getElementById('hitMarker').classList.add('show');
                    setTimeout(() => document.getElementById('hitMarker').classList.remove('show'), 100);
                    
                    if (enemy.userData.health <= 0) {
                        killEnemy(i);
                    }
                    break;
                }
            }
        }
        
        function killEnemy(index) {
            const enemy = gameState.enemies[index];
            createParticles(enemy.position, 0xff3333, 12);
            scene.remove(enemy);
            gameState.enemies.splice(index, 1);
            gameState.kills++;
            gameState.alive--;
            updateUI();
            addKillFeed("You killed an enemy!");
        }
        
        function reload() {
            if (gameState.isReloading || gameState.ammo === 30 || gameState.totalAmmo === 0) return;
            gameState.isReloading = true;
            document.getElementById('reloadIndicator').classList.add('show');
            
            setTimeout(() => {
                const needed = 30 - gameState.ammo;
                if (gameState.totalAmmo >= needed) {
                    gameState.ammo = 30;
                    gameState.totalAmmo -= needed;
                } else {
                    gameState.ammo += gameState.totalAmmo;
                    gameState.totalAmmo = 0;
                }
                gameState.isReloading = false;
                document.getElementById('reloadIndicator').classList.remove('show');
                updateUI();
            }, 1500);
        }
        
        function switchWeapon(num) {
            if (gameState.currentWeapon === num) return;
            camera.remove(currentWeaponMesh);
            gameState.currentWeapon = num;
            currentWeaponMesh = weapons[num];
            currentWeaponMesh.position.set(0.35, -0.35, -0.8);
            camera.add(currentWeaponMesh);
            document.getElementById('weapon1').classList.toggle('active', num === 1);
            document.getElementById('weapon2').classList.toggle('active', num === 2);
        }
        
        // UI
        function updateUI() {
            document.getElementById('healthFill').style.width = gameState.health + '%';
            document.getElementById('armorFill').style.width = gameState.armor + '%';
            document.getElementById('killCount').textContent = gameState.kills;
            document.getElementById('aliveCount').textContent = gameState.alive;
            document.getElementById('currentAmmo').textContent = gameState.ammo;
            document.getElementById('totalAmmo').textContent = gameState.totalAmmo;
        }
        
        function addKillFeed(msg) {
            const feed = document.getElementById('killFeed');
            const item = document.createElement('div');
            item.className = 'kill-item';
            item.textContent = msg;
            feed.appendChild(item);
            setTimeout(() => item.remove(), 3500);
        }
        
        // Player movement
        const playerDir = new THREE.Vector3();
        const moveSpeed = 12;
        const sprintSpeed = 20;
        
        function updatePlayer(dt) {
            if (!gameState.isPlaying) return;
            
            const speed = (keys['ShiftLeft'] || keys['ShiftRight']) ? sprintSpeed : moveSpeed;
            
            playerDir.set(0, 0, 0);
            if (keys['KeyW']) playerDir.z -= 1;
            if (keys['KeyS']) playerDir.z += 1;
            if (keys['KeyA']) playerDir.x -= 1;
            if (keys['KeyD']) playerDir.x += 1;
            
            if (playerDir.length() > 0) {
                playerDir.normalize();
                playerDir.applyAxisAngle(new THREE.Vector3(0, 1, 0), mouseX);
                player.position.x += playerDir.x * speed * dt;
                player.position.z += playerDir.z * speed * dt;
            }
            
            // Camera follow
            const camOffset = new THREE.Vector3(0, 2.5, 6);
            camOffset.applyAxisAngle(new THREE.Vector3(0, 1, 0), mouseX);
            camera.position.copy(player.position).add(camOffset);
            camera.lookAt(player.position.x, player.position.y + 1, player.position.z);
            camera.rotation.x += mouseY;
            
            // Boundary check
            player.position.x = Math.max(-290, Math.min(290, player.position.x));
            player.position.z = Math.max(-290, Math.min(290, player.position.z));
        }
        
        // Enemy AI
        function updateEnemies(dt) {
            for (let i = gameState.enemies.length - 1; i >= 0; i--) {
                const enemy = gameState.enemies[i];
                const dist = enemy.position.distanceTo(player.position);
                
                if (dist < 80 && dist > 8) {
                    const dir = new THREE.Vector3();
                    dir.subVectors(player.position, enemy.position);
                    dir.normalize();
                    enemy.position.x += dir.x * enemy.userData.speed * dt;
                    enemy.position.z += dir.z * enemy.userData.speed * dt;
                    enemy.lookAt(player.position);
                    
                    if (dist < 40 && Date.now() - enemy.userData.lastShot > 1500) {
                        enemy.userData.lastShot = Date.now();
                        gameState.health -= 10;
                        updateUI();
                        
                        if (gameState.health <= 0) {
                            gameOver();
                        }
                    }
                }
            }
        }
        
        // Particles
        function updateParticles(dt) {
            for (let i = gameState.particles.length - 1; i >= 0; i--) {
                const p = gameState.particles[i];
                p.userData.life -= dt * 2;
                p.position.add(p.userData.vel.clone().multiplyScalar(dt));
                p.userData.vel.y -= 15 * dt;
                p.scale.setScalar(p.userData.life);
                
                if (p.userData.life <= 0) {
                    scene.remove(p);
                    gameState.particles.splice(i, 1);
                }
            }
        }
        
        // Minimap
        const minimapCanvas = document.getElementById('minimapCanvas');
        const minimapCtx = minimapCanvas.getContext('2d');
        
        function updateMinimap() {
            minimapCtx.fillStyle = '#0a2a0a';
            minimapCtx.fillRect(0, 0, 120, 120);
            
            const scale = 0.4;
            const cx = 60, cy = 60;
            
            // Trees
            minimapCtx.fillStyle = '#2d5a2d';
            gameState.trees.forEach(tree => {
                const x = cx + (tree.position.x - player.position.x) * scale;
                const y = cy + (tree.position.z - player.position.z) * scale;
                if (x > 0 && x < 120 && y > 0 && y < 120) {
                    minimapCtx.fillRect(x - 2, y - 2, 4, 4);
                }
            });
            
            // Buildings
            minimapCtx.fillStyle = '#5a4a3a';
            gameState.buildings.forEach(b => {
                const x = cx + (b.position.x - player.position.x) * scale;
                const y = cy + (b.position.z - player.position.z) * scale;
                if (x > 0 && x < 120 && y > 0 && y < 120) {
                    minimapCtx.fillRect(x - 4, y - 4, 8, 8);
                }
            });
            
            // Enemies
            minimapCtx.fillStyle = '#ff3333';
            gameState.enemies.forEach(e => {
                const x = cx + (e.position.x - player.position.x) * scale;
                const y = cy + (e.position.z - player.position.z) * scale;
                if (x > 0 && x < 120 && y > 0 && y < 120) {
                    minimapCtx.beginPath();
                    minimapCtx.arc(x, y, 3, 0, Math.PI * 2);
                    minimapCtx.fill();
                }
            });
            
            // Player
            minimapCtx.fillStyle = '#ffffff';
            minimapCtx.beginPath();
            minimapCtx.arc(cx, cy, 4, 0, Math.PI * 2);
            minimapCtx.fill();
            
            // Direction
            minimapCtx.strokeStyle = '#ffffff';
            minimapCtx.lineWidth = 2;
            minimapCtx.beginPath();
            minimapCtx.moveTo(cx, cy);
            minimapCtx.lineTo(cx - Math.sin(mouseX) * 10, cy - Math.cos(mouseX) * 10);
            minimapCtx.stroke();
        }
        
        // Game Over
        function gameOver() {
            gameState.isPlaying = false;
            document.exitPointerLock();
            document.getElementById('ui').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'flex';
            document.getElementById('gameOverStats').textContent = `Kills: ${gameState.kills}`;
        }
        
        // Reset game
        function resetGame() {
            gameState.health = 100;
            gameState.armor = 100;
            gameState.kills = 0;
            gameState.alive = 25;
            gameState.ammo = 30;
            gameState.totalAmmo = 90;
            gameState.isReloading = false;
            
            // Remove old enemies
            gameState.enemies.forEach(e => scene.remove(e));
            gameState.enemies = [];
            
            // Spawn new enemies
            for (let i = 0; i < 24; i++) {
                let x, z;
                do {
                    x = (Math.random() - 0.5) * 300;
                    z = (Math.random() - 0.5) * 300;
                } while (Math.abs(x) < 30 && Math.abs(z) < 30);
                
                const enemy = createEnemy(x, z);
                scene.add(enemy);
                gameState.enemies.push(enemy);
            }
            
            player.position.set(0, 0, 0);
            mouseX = 0;
            mouseY = 0;
            updateUI();
        }
        
        // Start/Restart
        document.getElementById('startBtn').addEventListener('click', () => {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('ui').style.display = 'block';
            gameState.isPlaying = true;
            canvas.requestPointerLock();
            updateUI();
        });
        
        document.getElementById('restartBtn').addEventListener('click', () => {
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('ui').style.display = 'block';
            resetGame();
            gameState.isPlaying = true;
            canvas.requestPointerLock();
        });
        
        // Animation loop
        const clock = new THREE.Clock();
        
        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            
            updatePlayer(dt);
            updateEnemies(dt);
            updateParticles(dt);
            updateMinimap();
            
            renderer.render(scene, camera);
        }
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        animate();
    </script>
</body>
</html>
